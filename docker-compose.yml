version: '3.8'

services:
  db:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_USER: adrex
      POSTGRES_PASSWORD: adrexpassword
      POSTGRES_DB: adrex_media
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    ports:
      - '5000:5000'
    environment:
      DATABASE_URL: postgresql://adrex:adrexpassword@db:5432/adrex_media
      JWT_SECRET: your_jwt_secret_here
      GROQ_API_KEY: your_groq_api_key_here
      NODE_ENV: production
      PORT: 5000
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: always
    ports:
      - '3000:3000'
    environment:
      NEXT_PUBLIC_API_URL: http://backend:5000
    depends_on:
      - backend

  team-portal:
    build:
      context: ./team-portal
      dockerfile: Dockerfile
    restart: always
    ports:
      - '3001:3001'
    environment:
      NEXT_PUBLIC_API_URL: http://backend:5000
    depends_on:
      - backend

volumes:
  postgres_data:
